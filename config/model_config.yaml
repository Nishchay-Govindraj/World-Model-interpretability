# ============================================================
# Transformer World Model Configuration
# Two scales: small (5M, local RTX 3060) and large (25M, A100 cluster)
# ============================================================

# ---- Small model (local development & validation) ----------
small:
  n_layers: 6
  n_heads: 8
  d_model: 256
  d_ff: 1024                       # feedforward dim = 4 * d_model
  dropout: 0.1
  context_length: 1083             # 19x19x3 = one full FourRooms observation
  vocab_size: 32                   # MiniGrid cell values (object/colour/state IDs)
  # Estimated VRAM at batch_size=64: ~1.8GB — safe on RTX 3060

# ---- Large model (A100 cluster) ----------------------------
large:
  n_layers: 12
  n_heads: 8
  d_model: 512
  d_ff: 2048
  dropout: 0.1
  context_length: 1083             # 19x19x3 = one full FourRooms observation
  vocab_size: 32                   # MiniGrid cell values (object/colour/state IDs)
  # Estimated VRAM at batch_size=128: ~12GB — A100 cluster

# ---- Training ----------------------------------------------
training:
  # Local (RTX 3060)
  local:
    batch_size: 24                 # reduced from 64 — eases GPU/thermal load under
                                   # contention from background apps (Discord, Teams, etc)
    learning_rate: 3.0e-4
    weight_decay: 0.1
    max_steps: 100000
    warmup_steps: 2000
    gradient_clip: 1.0
    amp: true                      # automatic mixed precision (FP16)
    num_workers: 0                 # 0 avoids Windows multiprocessing overhead/stalls
    log_every: 50                  # log more frequently to catch stalls earlier
    eval_every: 1000
    save_every: 1000               # checkpoint more often — minimise lost progress
    checkpoint_dir: "checkpoints"

  # Cluster (A100)
  cluster:
    batch_size: 256
    learning_rate: 3.0e-4
    weight_decay: 0.1
    max_steps: 300000
    warmup_steps: 5000
    gradient_clip: 1.0
    amp: true
    num_workers: 8
    log_every: 100
    eval_every: 2000
    save_every: 10000
    checkpoint_dir: "checkpoints"

# ---- W&B logging -------------------------------------------
wandb:
  project: "world-model-interpretability"
  entity: null                     # set to your W&B username
  tags: ["track-a", "world-model"]
  log_gradients: false             # set true for debugging
